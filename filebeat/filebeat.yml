filebeat.inputs:
- type: container
  enabled: true
  paths:
    - /var/lib/docker/containers/*/*.log
  processors:
    - decode_json_fields:
        when:
          regexp:
            message: '^\s*\{'
        fields: ["message"]
        target: ""
        overwrite_keys: true
        add_error_key: true
    - drop_fields:
        fields: ["agent", "container", "ecs", "event", "host", "input", "log", "stream"]
        ignore_missing: true

setup.template.enabled: false
setup.ilm.enabled: false

output.elasticsearch:
  hosts: ["http://elasticsearch:9200"]
  index: "myapp-logs-%{+yyyy.MM.dd}"
  pipeline: "myapp-logs-raw-json"

logging.level: info
logging.to_files: false
