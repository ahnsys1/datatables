input {
  beats {
    port => 5044
    ecs_compatibility => "disabled"
  }
  tcp {
    port => 5000
    codec => json_lines { ecs_compatibility => "disabled" }
    ecs_compatibility => "disabled"
  }
}

filter {
  # Route backend container logs to a dedicated index based on the actual
  # container name/image values sent by Filebeat's Docker metadata processor.
  if [container] or [docker] {
    if ([container][name] =~ /^myapp-jpa-server-backend(-\d+)?$/)
       or ([container][image][name] =~ /^myapp-jpa-server-backend(:latest)?$/)
       or ([container][image] =~ /^myapp-jpa-server-backend(:latest)?$/)
       or ([docker][container][image] =~ /myapp-jpa-server-backend(:|\/)?latest/)
    {
      mutate {
        add_field => { "[@metadata][target_index]" => "myapp-jpa-server-backend" }
        add_tag => [ "myapp-jpa-server-backend" ]
      }
    } else {
      # Non-matching container -> route to a generic index
      mutate { add_field => { "[@metadata][target_index]" => "other-logs" } }
    }
  } else {
    # If no container/docker metadata, keep as other logs
    mutate { add_field => { "[@metadata][target_index]" => "other-logs" } }
  }
}

output {
  if [@metadata][target_index] {
    elasticsearch {
      ecs_compatibility => "disabled"
      hosts => ["http://elasticsearch:9200"]
      index => "%{[@metadata][target_index]}-%{+YYYY.MM.dd}"
    }
  } else {
    stdout { codec => rubydebug }
  }
}
