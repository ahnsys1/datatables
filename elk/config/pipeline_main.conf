# Main pipeline: receives input from stdin/beats, processes, and sends to ES + secondary pipeline

input {
  # Accept input from stdin (for testing)
  stdin { }
  
  # Alternatively, accept from Beats (uncomment to use):
  # beats { 
  #   port => 5044
  # }
}

filter {
  # Add timestamp and some basic fields
  mutate {
    add_field => { "[@metadata][pipeline]" => "main" }
  }
}

output {
  # Send to Elasticsearch
  elasticsearch {
    hosts => ["http://localhost:9200"]
    index => "logstash-main-%{+YYYY.MM.dd}"
  }
  
  # Forward to secondary pipeline for additional processing
  pipeline {
    send_to => ["secondary"]
  }
  
  # Also print to stdout for visibility
  stdout {
    codec => rubydebug
  }
}
