# Secondary pipeline: receives events from main pipeline and outputs them

input {
  # Receive events forwarded from the main pipeline
  pipeline {
    address => "secondary"
  }
}

filter {
  # Add metadata indicating this is secondary processing
  mutate {
    add_field => { "[@metadata][processed_by]" => "secondary" }
    add_field => { "processed_timestamp" => "%{@timestamp}" }
  }
}

output {
  # Send processed events to a different Elasticsearch index
  elasticsearch {
    hosts => ["http://localhost:9200"]
    index => "logstash-secondary-%{+YYYY.MM.dd}"
  }
  
  # Print to stdout for visibility during testing
  stdout {
    codec => rubydebug
  }
}
