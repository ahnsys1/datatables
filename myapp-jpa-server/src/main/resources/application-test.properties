# ===================================================================
# TEST PROFILE CONFIGURATION
# ===================================================================
# Properties for the 'test' Spring profile, active during tests.
server.port=9090
# Spring Boot will automatically detect Testcontainers on the classpath
# and use it to start a PostgreSQL container.
# The `spring.datasource.url` will be automatically replaced with the dynamic
# JDBC URL of the container.

# Jackson JSON Configuration
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.serialization.write-dates-as-timestamps=true

# General JPA properties for tests
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true


# When using @ServiceConnection with Testcontainers, Spring Boot auto-configures the datasource.
# Do not hardcode datasource or Flyway connection properties here.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=public
spring.flyway.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
