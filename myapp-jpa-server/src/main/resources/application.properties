# ===================================================================
# DEVELOPMENT DATABASE CONFIGURATION (e.g., local H2 or Docker)
# ===================================================================
# For local development, you might use an H2 in-memory database
server.port=9090


# Docker Compose overrides these via environment variables; localhost keeps host-side runs working.
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:myuser}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:mypassword}


# STOMP Relay Credentials
# These are used by the WebSocketConfig to connect to the STOMP broker.
spring.rabbitmq.stomp.username=${SPRING_RABBITMQ_USERNAME:myuser}
spring.rabbitmq.stomp.password=${SPRING_RABBITMQ_PASSWORD:mypassword}
spring.rabbitmq.stomp.port=${SPRING_RABBITMQ_STOMP_PORT:61613}


# Activate 'dev' profile by default for development runs
#spring.profiles.active=test

spring.jpa.hibernate.ddl-auto=none

spring.jackson.date-format=yyyy-MM-dd
spring.jackson.serialization.write-dates-as-timestamps=true
# This property prevents Jackson from failing when it encounters uninitialized Hibernate proxies.
spring.jackson.serialization.fail-on-empty-beans=false


# ===================================================================
# ACTUATOR CONFIGURATION
# ===================================================================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

#Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=public
spring.flyway.driver-class-name=org.postgresql.Driver
spring.flyway.baseline-on-migrate=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.security.oauth2.resourceserver.jwt.issuer-uri=${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:8180/realms/myrealm}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI:http://localhost:8180/realms/myrealm/protocol/openid-connect/certs}

#
#
#spring.jpa.database=POSTGRESQL
# For containerized environments Docker overrides this with the service hostname via SPRING_DATASOURCE_URL.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
#
#
#

app.keycloak.admin.server-url=${KEYCLOAK_ADMIN_SERVER_URL:http://localhost:8180}
app.keycloak.admin.realm=${KEYCLOAK_REALM:myrealm}
app.keycloak.admin.admin-realm=${KEYCLOAK_ADMIN_REALM:master}
app.keycloak.admin.client-id=${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
app.keycloak.admin.username=${KEYCLOAK_ADMIN_USERNAME:admin}
app.keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD:admin}
app.keycloak.admin.bootstrap-admin-usernames=${TASK_MANAGEMENT_BOOTSTRAP_ADMIN_USERNAMES:demo}

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.schema=public
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.validation-timeout=50000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=180000
