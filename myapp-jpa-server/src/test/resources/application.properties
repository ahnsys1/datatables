# Use test profile settings; keep broker host empty so embedded SimpleBroker is used
spring.rabbitmq.host=
# When running tests without an external broker, provide defaults for STOMP placeholders
spring.rabbitmq.stomp.username=myuser
spring.rabbitmq.stomp.password=mypassword
spring.rabbitmq.stomp.port=61613
# Use embedded H2 for tests and disable Flyway migrations to avoid Postgres dependency
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

# Reduce logging noise but keep messaging debug useful for tests
logging.level.org.springframework.messaging=DEBUG
logging.level.org.springframework.web.socket=DEBUG
logging.level.org.springframework.web.socket.stomp=DEBUG
logging.level.org.springframework.messaging.simp.stomp=DEBUG
logging.level.com.angular.backend.chat=DEBUG
logging.level.com.angular.backend.config=DEBUG

app.keycloak.admin.realm=myrealm
app.keycloak.admin.admin-realm=master
app.keycloak.admin.client-id=admin-cli
app.keycloak.admin.username=admin
app.keycloak.admin.password=admin
app.keycloak.admin.bootstrap-admin-usernames=demo
